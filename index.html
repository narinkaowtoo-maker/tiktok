<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบส่งการแจ้งเตือนทดสอบ</title>
</head>
<body>

    <h2>ทดลองส่งข้อความไปที่ Discord</h2>
    
    <form id="testForm">
        <label for="message">ข้อความที่ต้องการส่ง:</label><br>
        <input type="text" id="message" name="message" required><br><br>
        <button type="submit">ส่งข้อมูล</button>
    </form>

    <script>
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรช

            // แทนที่ ตรงนี้ ด้วย URL Webhook จริงของคุณจาก Discord
            const webhookUrl = 'https://discordapp.com/api/webhooks/1505544002550894722/RUjDHbux3C0YOWveT1xcJ07SYzN9nNXHIm2_YfyuBAs0DZlzkcUqj7zDHzpPKwQKOUAi'; 
            const messageText = document.getElementById('message').value;

            // จัดรูปแบบข้อมูลตามที่ Discord API กำหนด
            const requestData = {
                content: `📢 **ข้อความแจ้งเตือนทดสอบ:** ${messageText}`
            };

            // ส่งข้อมูลไปยัง Discord ด้วย Fetch API
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestData)
            })
            .then(response => {
                if (response.ok) {
                    alert('ส่งข้อมูลสำเร็จแล้ว! ลองเช็คใน Discord ดูนะ');
                } else {
                    alert('เกิดข้อผิดพลาดในการส่งข้อมูล');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('ไม่สามารถเชื่อมต่อกับ Webhook ได้');
            });
        });
    </script>

</body>
</html>
